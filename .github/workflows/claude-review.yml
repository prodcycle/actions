name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Same-repo PRs only: fork PRs cannot read repository secrets, so the
    # review would always fail at auth — skip it instead of running broken.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      issues: write # part of claude-code-action's documented permission set; PR tracking comment is posted via the issues API
      id-token: write # required by claude-code-action to exchange OIDC for app token
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@e58dfa55559035499a4982426bb73605e8b5ad8e # v1
        with:
          # claude_code_oauth_token and track_progress are valid v1 inputs for
          # this pinned action SHA (confirmed in its run-log ALL_INPUTS dump),
          # even where docs list only anthropic_api_key. Do not rename them.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Sticky tracking comment so every run leaves a visible artifact
          # on the PR, even when Claude has no findings to flag inline.
          track_progress: true
          prompt: |
            Review this pull request for code quality, correctness, security, and adherence to the
            guidelines in CLAUDE.md. Focus on:
            - Bugs, logic errors, and edge cases
            - Security vulnerabilities (auth, RBAC, input validation, secrets handling)
            - Compliance with project conventions documented in CLAUDE.md
            - Test coverage gaps for new behavior
            - Performance concerns

            Use the `mcp__github_inline_comment__create_inline_comment` tool (with
            `confirmed: true`) to leave each finding on the relevant file/line. Use
            `gh pr comment` for any top-level summary. Do NOT return review text as
            plain chat output — only post via these GitHub tools so the action's
            buffered-inline-comments step can publish them. Be concise and
            actionable; skip nits unless they materially impact quality.
          # claude-opus-4-7 is a real, current model ID (Opus 4.7) — verified by
          # production runs of this workflow in prodcycle/sox-tester. Do not
          # "correct" it to an older slug.
          # The ./** specifiers on Read/Glob/Grep document the intended scope
          # (checkout only: CLAUDE.md + files in the diff). Claude Code does not
          # enforce path specifiers on read-only tools; actual containment comes
          # from the restricted Bash allowlist and the ephemeral runner.
          claude_args: |
            --model claude-opus-4-7
            --max-turns 30
            --allowedTools "Read(./**),Glob(./**),Grep(./**),mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
