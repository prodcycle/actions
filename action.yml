name: "ProdCycle Actions"
description: "A set of GitHub Actions for ProdCycle. Defaults to the Compliance Code Scanner."

branding:
  icon: "shield"
  color: "blue"

inputs:
  api-key:
    description: "ProdCycle compliance API key (pc_...)"
    required: true
  api-url:
    description: "ProdCycle API base URL"
    required: false
    default: "https://api.prodcycle.com"
  frameworks:
    description: "Comma-separated framework IDs to evaluate (soc2, hipaa, nist-csf). Defaults to workspace setting."
    required: false
    default: ""
  fail-on:
    description: "Comma-separated severities that fail the check (critical, high, medium, low)"
    required: false
    default: "critical,high"
  severity-threshold:
    description: "Minimum severity to report (critical, high, medium, low)"
    required: false
    default: "low"
  include:
    description: 'Comma-separated glob patterns to include (e.g. "*.tf,*.yaml"). Defaults to all changed files.'
    required: false
    default: ""
  exclude:
    description: 'Comma-separated glob patterns to exclude (e.g. "test/**,docs/**")'
    required: false
    default: ""
  annotate:
    description: "Create inline workflow annotations (core.error/warning/notice) for findings. Does NOT control the formal PR review event — use `review-event` for that."
    required: false
    default: "true"
  comment:
    description: "Post a summary comment on the PR"
    required: false
    default: "true"
  review-event:
    description: "PR review event when findings are posted. One of: 'auto' (COMMENT on pass, REQUEST_CHANGES on fail — historical behavior), 'comment' (always COMMENT, never blocks merge), 'request-changes' (always REQUEST_CHANGES), or 'none' (skip the PR review entirely). Empty string resolves to 'auto' when annotate=true, 'none' when annotate=false (back-compat)."
    required: false
    default: ""
  scan-mode:
    description: "Scan mode: 'auto' (diff for PRs, full for pushes), 'diff' (only changed lines), 'full' (entire codebase)."
    required: false
    default: "auto"
  exclude-accepted-risk:
    description: "Skip findings that have been marked as accepted risk in the ProdCycle platform. Requires product-id or sync-config-id to be set."
    required: false
    default: "true"
  exclude-resolved:
    description: "Also skip findings marked as resolved in the ProdCycle platform (opt-in). Requires product-id or sync-config-id."
    required: false
    default: "false"
  product-id:
    description: "ProdCycle product UUID this repo maps to. Enables accepted-risk/resolved suppression for the product. Either this or sync-config-id."
    required: false
    default: ""
  sync-config-id:
    description: "ProdCycle sync configuration UUID linking this repo to a product. Alternative to product-id for identifying the product."
    required: false
    default: ""
  github-token:
    description: "GitHub token for PR comments and annotations. Defaults to the automatic GITHUB_TOKEN."
    required: false
    default: ${{ github.token }}
  comment-identity:
    description: "Who authors PR comments. 'auto' posts as prodcycle[bot] when the ProdCycle GitHub App is installed (falling back to github-actions[bot]), 'app' requires the App identity, 'github-token' always uses github-actions[bot]. Requires pull-requests: write permission to resolve threads."
    required: false
    default: "auto"

outputs:
  passed:
    description: "Whether the scan passed (true/false)"
  findings-count:
    description: "Total number of findings"
  scan-id:
    description: "ProdCycle scan ID for linking to the dashboard"
  summary:
    description: "JSON summary of results by severity and framework"

runs:
  using: "node24"
  main: "compliance/dist/index.js"
